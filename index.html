<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta name="theme-color" content="#000000" />
  <title>Magnifico · OTC Signals</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== PASSCODE OVERLAY ===== -->
  <div id="passcodeOverlay">
    <div class="passcode-box">
      <h2>🔐 Access Code</h2>
      <p class="sub">Enter your 6‑digit passcode</p>
      <div class="passcode-input-group" id="passcodeInputGroup">
        <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus />
        <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" />
      </div>
      <div class="passcode-error" id="passcodeError"></div>
      <button id="passcodeSubmitBtn">Unlock</button>
    </div>
  </div>

  <!-- ===== MAIN APP ===== -->
  <div class="app-container" id="mainApp">
    <div class="signal-card">

      <!-- header -->
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
        <div class="badge">⚡ MAGNIFICO· OTC</div>
        <div class="status-container">
          <div class="status-indicator">
            <div id="statusLed" class="status-led offline"></div>
            <span id="statusText" class="status-text offline">OFFLINE</span>
          </div>
        </div>
      </div>

      <h1>Magnifico AI<br><span style="font-size:0.8rem;">Multi‑timeframe EMA Strategy · Binary OTC</span></h1>

      <!-- assets with checkboxes + per-asset expiry time -->
      <div class="asset-grid" id="assetGrid">
        <!-- rendered by JS -->
      </div>

      <!-- manual trigger -->
      <button id="analyzeBtn" style="width:100%; margin:10px 0;">🔍 Analyse Now</button>

      <div class="last-updated" id="timestampMsg">🟢 Ready to scan selected assets</div>
      <div class="info-note">
        📨 Signals are sent to Telegram only — nothing is shown on this page<br>
        🎯 Price + confidence % · no TP/SL
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
