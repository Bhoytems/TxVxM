<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta name="theme-color" content="#000000" />
  <title>Trend Pulse · Spot Signals</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== PASSCODE OVERLAY ===== -->
  <div id="passcodeOverlay">
    <div class="passcode-box">
      <h2>🔐 Access Code</h2>
      <p class="sub">Enter your 6‑digit passcode</p>
      <div class="passcode-input-group" id="passcodeInputGroup">
        <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus />
        <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" />
      </div>
      <div class="passcode-error" id="passcodeError"></div>
      <button id="passcodeSubmitBtn">Unlock</button>
    </div>
  </div>

  <!-- ===== MAIN APP ===== -->
  <div class="app-container" id="mainApp">
    <div class="signal-card">

      <!-- header -->
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
        <div class="badge">⚡ TREND PULSE · SPOT</div>
        <div class="status-container">
          <div class="status-indicator">
            <div id="statusLed" class="status-led offline"></div>
            <span id="statusText" class="status-text offline">OFFLINE</span>
          </div>
        </div>
      </div>

      <h1>Trend Pulse<br><span style="font-size:0.8rem;">OB + FVG + BOS (SMC) · Spot Signals</span></h1>

      <!-- assets with checkboxes + per-asset timeframe -->
      <div class="asset-grid" id="assetGrid">
        <!-- rendered by JS -->
      </div>

      <!-- manual trigger -->
      <button id="analyzeBtn" style="width:100%; margin:10px 0;">🔍 Analyse Now</button>

      <!-- per-asset results -->
      <div id="resultsContainer" class="results-container">
        <!-- rendered by JS -->
      </div>

      <div class="last-updated" id="timestampMsg">🟢 Monitoring selected assets</div>
      <div class="info-note">
        📨 Signals auto‑sent to Telegram the moment an FVG fully fills and price bounces<br>
        🔄 Auto re-checked every minute · WAT timezone
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
